<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图片展示</title>
    <style>
        /* 让页面背景变黑，图片完美居中 */
        body { 
            margin: 0; 
            background: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        /* 保证图片自适应屏幕大小，不超出屏幕 */
        img { 
            max-width: 90%; 
            max-height: 90%; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>
    <img src="8fefb8456f69683e57eaf11bd854a928.jpg">
</body>
</html>
